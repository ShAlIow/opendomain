services:
  # PostgreSQL 数据库（OpenDomain 应用）
  postgres:
    image: postgres:15-alpine
    container_name: opendomain-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-opendomain}
      POSTGRES_USER: ${DB_USER:-opendomain}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-opendomain123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-opendomain}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opendomain-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: opendomain-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - opendomain-network

  # MariaDB 数据库（PowerDNS 专用）
  # 启用方式: docker compose --profile powerdns up -d
  pdns-db:
    image: mariadb:10.5
    container_name: opendomain-pdns-db
    restart: unless-stopped
    profiles: [powerdns]
    environment:
      MYSQL_ROOT_PASSWORD: ${PDNS_DB_ROOT_PASSWORD:-pdnsrootpass}
      MYSQL_DATABASE: ${PDNS_DB_NAME:-pdns}
      MYSQL_USER: ${PDNS_DB_USER:-pdns}
      MYSQL_PASSWORD: ${PDNS_DB_PASSWORD:-pdnspass}
    volumes:
      - pdns_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${PDNS_DB_ROOT_PASSWORD:-pdnsrootpass}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opendomain-network

  # PowerDNS 权威 DNS 服务器
  # 启用方式: docker compose --profile powerdns up -d
  powerdns:
    image: pschiffe/pdns-mysql:latest
    container_name: opendomain-powerdns
    restart: unless-stopped
    profiles: [powerdns]
    depends_on:
      pdns-db:
        condition: service_healthy
    environment:
      PDNS_gmysql_host: pdns-db
      PDNS_gmysql_user: ${PDNS_DB_USER:-pdns}
      PDNS_gmysql_password: ${PDNS_DB_PASSWORD:-pdnspass}
      PDNS_gmysql_dbname: ${PDNS_DB_NAME:-pdns}
      PDNS_api: "yes"
      PDNS_api_key: ${POWERDNS_API_KEY:-changeme-pdns-api-key}
      PDNS_webserver: "yes"
      PDNS_webserver_address: "0.0.0.0"
      PDNS_webserver_allow_from: "0.0.0.0/0"
      PDNS_resolver: "8.8.8.8"
      PDNS_expand-alias: "yes"
      PDNS_gmysql_dnssec: "yes"
      PDNS_enable-lua-records: "yes"
    ports:
      - "${DNS_PORT:-53}:53/udp"
      - "${DNS_PORT:-53}:53/tcp"
      - "${PDNS_API_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD", "pdns_control", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - opendomain-network

  # PowerDNS Admin 管理面板
  # 启用方式: docker compose --profile powerdns up -d
  pdns-admin:
    image: powerdnsadmin/pda-legacy:latest
    container_name: opendomain-pdns-admin
    restart: unless-stopped
    profiles: [powerdns]
    depends_on:
      pdns-db:
        condition: service_healthy
      powerdns:
        condition: service_healthy
    ports:
      - "${PDNS_ADMIN_PORT:-9191}:80"
    environment:
      SECRET_KEY: ${PDNS_ADMIN_SECRET:-changeme-pdns-admin-secret}
      SQLALCHEMY_DATABASE_URI: "mysql://${PDNS_DB_USER:-pdns}:${PDNS_DB_PASSWORD:-pdnspass}@pdns-db/${PDNS_DB_NAME:-pdns}"
    volumes:
      - pdns_admin_data:/data
    networks:
      - opendomain-network

  # 数据库迁移（初始化 OpenDomain 表结构）
  migrate:
    image: migrate/migrate:latest
    container_name: opendomain-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      - "-path"
      - "/migrations"
      - "-database"
      - "postgres://${DB_USER:-opendomain}:${DB_PASSWORD:-opendomain123}@postgres:5432/${DB_NAME:-opendomain}?sslmode=disable"
      - "up"
    networks:
      - opendomain-network
    restart: on-failure

  # OpenDomain 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opendomain-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${PORT:-8000}:8000"
    environment:
      # 应用配置
      APP_ENV: ${APP_ENV:-production}
      PORT: ${PORT:-8000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}

      # 站点配置
      SITE_NAME: ${SITE_NAME:-OpenDomain}
      SITE_DESCRIPTION: ${SITE_DESCRIPTION:-Free Domain Registration Platform}

      # 数据库配置（连接到 postgres 服务）
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-opendomain}
      DB_PASSWORD: ${DB_PASSWORD:-opendomain123}
      DB_NAME: ${DB_NAME:-opendomain}
      DB_SSL_MODE: disable

      # Redis 配置（连接到 redis 服务）
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}

      # JWT 配置
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-key}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-2}

      # PowerDNS 配置（连接到内部 powerdns 服务）
      POWERDNS_API_URL: http://powerdns:8081
      POWERDNS_API_KEY: ${POWERDNS_API_KEY:-changeme-pdns-api-key}

      # 邮件配置
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@opendomain.com}

      # OAuth 配置
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      NODELOC_CLIENT_ID: ${NODELOC_CLIENT_ID:-}
      NODELOC_CLIENT_SECRET: ${NODELOC_CLIENT_SECRET:-}

      # 扫描器配置
      SCANNER_CONCURRENCY: ${SCANNER_CONCURRENCY:-10}
      SCANNER_TIMEOUT: ${SCANNER_TIMEOUT:-30}

      # 安全扫描 API
      GOOGLE_SAFE_BROWSING_KEY: ${GOOGLE_SAFE_BROWSING_KEY:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}

      # 默认 NS
      DEFAULT_NS1: ${DEFAULT_NS1:-ns1.example.com}
      DEFAULT_NS2: ${DEFAULT_NS2:-ns2.example.com}

      # NodeLoc 支付
      NODELOC_PAYMENT_ID: ${NODELOC_PAYMENT_ID:-}
      NODELOC_SECRET_KEY: ${NODELOC_SECRET_KEY:-}

      # Telegram Bot
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID:-}

      # FOSSBilling 集成
      FOSSBILLING_ENABLED: ${FOSSBILLING_ENABLED:-false}
      FOSSBILLING_URL: ${FOSSBILLING_URL:-}
      FOSSBILLING_ADMIN_API_KEY: ${FOSSBILLING_ADMIN_API_KEY:-}
    volumes:
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    networks:
      - opendomain-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pdns_db_data:
    driver: local
  pdns_admin_data:
    driver: local

networks:
  opendomain-network:
    driver: bridge
